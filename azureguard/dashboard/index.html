<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AzureGuard — Azure Compliance Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f1117; --surface: #1a1d27; --surface2: #222638;
      --border: #2d3148; --text: #e2e4f0; --muted: #8b90b0;
      --blue: #3b82f6; --green: #22c55e; --red: #ef4444;
      --orange: #f97316; --yellow: #eab308; --purple: #a855f7;
    }
    body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; min-height: 100vh; }
    header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 32px; display: flex; align-items: center; justify-content: space-between; height: 60px; }
    .logo { display: flex; align-items: center; gap: 10px; font-size: 18px; font-weight: 700; }
    .logo-icon { width: 32px; height: 32px; background: linear-gradient(135deg, #3b82f6, #8b5cf6); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 16px; }
    .badge { font-size: 11px; background: #1d4ed8; color: #bfdbfe; padding: 2px 8px; border-radius: 20px; }
    #scan-btn { background: var(--blue); color: #fff; border: none; padding: 8px 20px; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 8px; transition: opacity .2s; }
    #scan-btn:hover { opacity: .85; }
    #scan-btn.loading { opacity: .6; pointer-events: none; }
    main { max-width: 1200px; margin: 0 auto; padding: 28px 24px; }
    .grid-4 { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 24px; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 20px; }
    .metric-label { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 6px; }
    .metric-value { font-size: 36px; font-weight: 700; line-height: 1; }
    .metric-sub { font-size: 12px; color: var(--muted); margin-top: 4px; }
    .score-ring { position: relative; display: inline-flex; align-items: center; justify-content: center; }
    .score-ring canvas { transform: rotate(-90deg); }
    .score-number { position: absolute; font-size: 28px; font-weight: 700; }
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 24px; }
    @media (max-width: 700px) { .grid-2 { grid-template-columns: 1fr; } }
    .card h2 { font-size: 14px; font-weight: 600; margin-bottom: 16px; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th { text-align: left; padding: 8px 12px; color: var(--muted); font-weight: 500; font-size: 11px; text-transform: uppercase; letter-spacing: .06em; border-bottom: 1px solid var(--border); }
    td { padding: 10px 12px; border-bottom: 1px solid var(--border); vertical-align: top; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: var(--surface2); }
    .sev { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 700; text-transform: uppercase; }
    .sev-critical { background: #450a0a; color: #fca5a5; }
    .sev-high     { background: #431407; color: #fdba74; }
    .sev-medium   { background: #422006; color: #fde68a; }
    .sev-low      { background: #1e3a5f; color: #93c5fd; }
    .sev-info     { background: #1f2937; color: #9ca3af; }
    .pass { color: var(--green); } .fail { color: var(--red); }
    .filter-bar { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
    .filter-btn { background: var(--surface2); border: 1px solid var(--border); color: var(--muted); padding: 5px 14px; border-radius: 20px; font-size: 12px; cursor: pointer; transition: all .15s; }
    .filter-btn.active, .filter-btn:hover { background: var(--blue); border-color: var(--blue); color: #fff; }
    .empty { text-align: center; color: var(--muted); padding: 40px; }
    #toast { position: fixed; bottom: 24px; right: 24px; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 12px 18px; font-size: 13px; opacity: 0; transform: translateY(10px); transition: all .3s; pointer-events: none; z-index: 999; }
    #toast.show { opacity: 1; transform: translateY(0); }
    .chart-wrap { position: relative; height: 200px; }
  </style>
</head>
<body>
<header>
  <div class="logo">
    <div class="logo-icon">🛡️</div>
    AzureGuard
    <span class="badge">BETA</span>
  </div>
  <button id="scan-btn" onclick="runScan()">
    <span id="scan-icon">▶</span> Run Scan
  </button>
</header>

<main>
  <div class="grid-4" id="metrics">
    <div class="card">
      <div class="metric-label">Compliance Score</div>
      <div class="score-ring">
        <canvas id="scoreRing" width="90" height="90"></canvas>
        <div class="score-number" id="scoreNum">—</div>
      </div>
    </div>
    <div class="card">
      <div class="metric-label">Resources</div>
      <div class="metric-value" id="resCount">—</div>
      <div class="metric-sub">monitored</div>
    </div>
    <div class="card">
      <div class="metric-label">Checks Passed</div>
      <div class="metric-value pass" id="passed">—</div>
      <div class="metric-sub" id="passedSub"></div>
    </div>
    <div class="card">
      <div class="metric-label">Checks Failed</div>
      <div class="metric-value fail" id="failed">—</div>
      <div class="metric-sub" id="failedSub"></div>
    </div>
  </div>

  <div class="grid-2">
    <div class="card">
      <h2>Score History</h2>
      <div class="chart-wrap"><canvas id="historyChart"></canvas></div>
    </div>
    <div class="card">
      <h2>Failures by Severity</h2>
      <div class="chart-wrap"><canvas id="severityChart"></canvas></div>
    </div>
  </div>

  <div class="card">
    <h2>Compliance Results</h2>
    <div class="filter-bar">
      <button class="filter-btn active" onclick="filterResults('all', this)">All</button>
      <button class="filter-btn" onclick="filterResults('critical', this)">🔴 Critical</button>
      <button class="filter-btn" onclick="filterResults('high', this)">🟠 High</button>
      <button class="filter-btn" onclick="filterResults('medium', this)">🟡 Medium</button>
      <button class="filter-btn" onclick="filterResults('failed', this)">✗ Failed only</button>
      <button class="filter-btn" onclick="filterResults('passed', this)">✓ Passed only</button>
    </div>
    <div id="results-table"><div class="empty">Run a scan to see compliance results.</div></div>
  </div>
</main>

<div id="toast"></div>

<script>
  const API = '';
  let allResults = [];
  let scoreChart = null, histChart = null, sevChart = null;

  async function load() {
    try {
      const [score, history, summary, results] = await Promise.all([
        fetch(`${API}/api/score`).then(r => r.json()),
        fetch(`${API}/api/history`).then(r => r.json()),
        fetch(`${API}/api/summary`).then(r => r.json()),
        fetch(`${API}/api/compliance`).then(r => r.json()),
      ]);
      updateMetrics(score);
      updateHistory(history);
      updateSeverity(summary);
      allResults = results;
      renderTable(results);
    } catch (e) {
      toast('Could not connect to API. Is the server running?', true);
    }
  }

  function updateMetrics(data) {
    if (!data.score) return;
    document.getElementById('scoreNum').textContent = data.score;
    document.getElementById('resCount').textContent = data.resource_count ?? '—';
    drawScoreRing(data.score);
  }

  function drawScoreRing(score) {
    const canvas = document.getElementById('scoreRing');
    const ctx = canvas.getContext('2d');
    const color = score >= 80 ? '#22c55e' : score >= 60 ? '#eab308' : '#ef4444';
    if (scoreChart) scoreChart.destroy();
    scoreChart = new Chart(ctx, {
      type: 'doughnut',
      data: { datasets: [{ data: [score, 100 - score], backgroundColor: [color, '#2d3148'], borderWidth: 0 }] },
      options: { cutout: '75%', plugins: { legend: { display: false }, tooltip: { enabled: false } }, animation: { duration: 800 } }
    });
  }

  function updateHistory(history) {
    if (!history.length) return;
    const ctx = document.getElementById('historyChart').getContext('2d');
    if (histChart) histChart.destroy();
    histChart = new Chart(ctx, {
      type: 'line',
      data: {
        labels: history.map(h => h.collected_at.slice(0, 16).replace('T', ' ')),
        datasets: [{ label: 'Score', data: history.map(h => h.score), borderColor: '#3b82f6', backgroundColor: '#3b82f615', tension: 0.4, fill: true, pointRadius: 4 }]
      },
      options: { scales: { y: { min: 0, max: 100, grid: { color: '#2d3148' }, ticks: { color: '#8b90b0' } }, x: { grid: { color: '#2d3148' }, ticks: { color: '#8b90b0', maxRotation: 0, maxTicksLimit: 5 } } }, plugins: { legend: { display: false } }, maintainAspectRatio: false }
    });
  }

  function updateSeverity(summary) {
    if (!Object.keys(summary).length) return;
    const ctx = document.getElementById('severityChart').getContext('2d');
    const sevs = ['critical', 'high', 'medium', 'low'];
    const colors = { critical: '#ef4444', high: '#f97316', medium: '#eab308', low: '#3b82f6' };
    if (sevChart) sevChart.destroy();
    sevChart = new Chart(ctx, {
      type: 'bar',
      data: {
        labels: sevs.map(s => s.charAt(0).toUpperCase() + s.slice(1)),
        datasets: [
          { label: 'Failed', data: sevs.map(s => summary[s]?.failed ?? 0), backgroundColor: sevs.map(s => colors[s]) },
          { label: 'Passed', data: sevs.map(s => summary[s]?.passed ?? 0), backgroundColor: '#22c55e44' }
        ]
      },
      options: { scales: { x: { stacked: true, grid: { color: '#2d3148' }, ticks: { color: '#8b90b0' } }, y: { stacked: true, grid: { color: '#2d3148' }, ticks: { color: '#8b90b0' } } }, plugins: { legend: { labels: { color: '#8b90b0' } } }, maintainAspectRatio: false }
    });
  }

  function renderTable(results) {
    if (!results.length) {
      document.getElementById('results-table').innerHTML = '<div class="empty">No results to display.</div>';
      return;
    }
    const rows = results.map(r => `
      <tr>
        <td><span class="sev sev-${r.severity}">${r.severity}</span></td>
        <td><strong>${r.rule_id}</strong><br><small style="color:var(--muted)">${r.rule_name}</small></td>
        <td>${r.resource_name}<br><small style="color:var(--muted)">${r.resource_type}</small></td>
        <td class="${r.passed ? 'pass' : 'fail'}">${r.passed ? '✓' : '✗'} ${r.message}</td>
        <td style="color:var(--muted);font-size:12px">${r.remediation || '—'}</td>
      </tr>`).join('');

    document.getElementById('results-table').innerHTML = `
      <table>
        <thead><tr><th>Severity</th><th>Rule</th><th>Resource</th><th>Finding</th><th>Remediation</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>`;
  }

  function filterResults(filter, btn) {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    let filtered = allResults;
    if (filter === 'failed') filtered = allResults.filter(r => !r.passed);
    else if (filter === 'passed') filtered = allResults.filter(r => r.passed);
    else if (filter !== 'all') filtered = allResults.filter(r => r.severity === filter);
    renderTable(filtered);
  }

  async function runScan() {
    const btn = document.getElementById('scan-btn');
    const icon = document.getElementById('scan-icon');
    btn.classList.add('loading');
    icon.textContent = '⏳';
    toast('Scanning Azure resources...');
    try {
      const res = await fetch(`${API}/api/scan`, { method: 'POST' });
      if (!res.ok) throw new Error(await res.text());
      const data = await res.json();
      toast(`Scan complete — Score: ${data.compliance_score}/100 · ${data.resource_count} resources`);
      await load();
    } catch (e) {
      toast(`Scan failed: ${e.message}`, true);
    } finally {
      btn.classList.remove('loading');
      icon.textContent = '▶';
    }
  }

  function toast(msg, isError = false) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.style.borderColor = isError ? 'var(--red)' : 'var(--green)';
    el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), 3500);
  }

  load();
  setInterval(load, 60000);
</script>
</body>
</html>
